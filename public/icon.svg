<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Instant Re-Play">
  <!-- Direction B — the replay loop: a circular replay arrow wrapped around a
       play mark on the golden-hour tile. Walnut arc + clay arrowhead + aloe
       play triangle over a warm plaster/ground radial. This is the canonical
       source; the shipped PNGs (apple-touch-icon, icon-192/512, maskable) are
       rasterized from it by scripts/gen-icons.mjs. -->
  <defs>
    <radialGradient id="tile" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#FFFCF5"/>
      <stop offset="55%" stop-color="#E9DAC0"/>
      <stop offset="100%" stop-color="#E3D2B4"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>
  <path d="M256 150 a106 106 0 1 1 -96 61" fill="none" stroke="#7A5233" stroke-width="30" stroke-linecap="round"/>
  <polygon points="256,120 300,150 256,180" fill="#A5502F"/>
  <polygon points="232,214 300,256 232,298" fill="#3B6B4C"/>
</svg>
